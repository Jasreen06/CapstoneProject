name: DockWise Daily Pipeline

on:
  schedule:
    - cron: "0 6 * * *"    # Daily data pull — 06:00 UTC
    - cron: "0 7 * * *"    # Validate forecasts — 07:00 UTC
    - cron: "0 8 * * 1"    # Weekly model comparison — Monday 08:00 UTC
  workflow_dispatch:        # Allows manual trigger from GitHub UI

jobs:

  data-pull:
    name: Pull Port & Chokepoint Data
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 6 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Trigger data pull
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/res.json -w "%{http_code}" \
            -X POST ${{ secrets.BACKEND_URL }}/admin/run-data-pull \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --retry 3 --retry-delay 10)
          echo "Response: $(cat /tmp/res.json)"
          [ "$HTTP_STATUS" = "200" ] || (echo "Failed: $HTTP_STATUS" && exit 1)

  validate-forecasts:
    name: Validate Forecast Predictions
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 7 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Trigger forecast validation
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/res.json -w "%{http_code}" \
            -X POST ${{ secrets.BACKEND_URL }}/admin/validate-forecasts \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --retry 3 --retry-delay 10)
          echo "Response: $(cat /tmp/res.json)"
          [ "$HTTP_STATUS" = "200" ] || (echo "Failed: $HTTP_STATUS" && exit 1)

  model-comparison:
    name: Weekly Model Comparison
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 8 * * 1'
    steps:
      - name: Trigger model comparison
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/res.json -w "%{http_code}" \
            -X POST ${{ secrets.BACKEND_URL }}/api/model-comparison/run \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            --retry 3 --retry-delay 10)
          echo "Response: $(cat /tmp/res.json)"
          [ "$HTTP_STATUS" = "200" ] || (echo "Failed: $HTTP_STATUS" && exit 1)

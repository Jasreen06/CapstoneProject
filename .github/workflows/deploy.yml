name: Deploy DockWise AI Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ── Frontend (React → nginx static) ─────────────────────────────────────────
  # Backends are deployed via Cloud Run's built-in GitHub CD.
  # This job exists only because REACT_APP_* URLs must be baked in at build time,
  # which Cloud Run's CD UI cannot do for Create React App.
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    env:
      REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/dockwise
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker and ensure Artifact Registry repo exists
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet
          gcloud artifacts repositories create dockwise \
            --repository-format=docker \
            --location=${{ secrets.GCP_REGION }} \
            --quiet 2>/dev/null || true

      - name: Build and push frontend image
        run: |
          docker build \
            --build-arg "REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}" \
            --build-arg "REACT_APP_AIS_URL=${{ secrets.REACT_APP_AIS_URL }}" \
            -t ${{ env.REGISTRY }}/frontend:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/frontend:latest \
            venv2/frontend/
          docker push ${{ env.REGISTRY }}/frontend:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/frontend:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: dockwise-frontend
          region: ${{ secrets.GCP_REGION }}
          image: ${{ env.REGISTRY }}/frontend:${{ github.sha }}
          flags: --port=80 --memory=256Mi --cpu=1 --allow-unauthenticated

  # ── Notify on failure ────────────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy-frontend]
    if: failure()
    steps:
      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.NOTIFY_EMAIL }}
          password: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          to: darshinilatha2000@gmail.com
          subject: "DockWise Frontend Deploy FAILED — ${{ github.run_id }}"
          body: |
            Frontend deployment failed on branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            View logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

name: Deploy DockWise AI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ── Backend: deploy to Render ────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render backend deploy
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/res.json -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            --retry 3 --retry-delay 5)
          echo "Response: $(cat /tmp/res.json)"
          [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "201" ] || [ "$HTTP_STATUS" = "202" ] || (echo "Render deploy failed: $HTTP_STATUS" && exit 1)

      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend to come up..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.BACKEND_URL }}/health)
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Attempt $i — status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Backend did not become healthy in time"
          exit 1

  # ── Frontend: build and deploy to Render static site ─────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render frontend deploy
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/res.json -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}" \
            --retry 3 --retry-delay 5)
          echo "Response: $(cat /tmp/res.json)"
          [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "201" ] || [ "$HTTP_STATUS" = "202" ] || (echo "Render frontend deploy failed: $HTTP_STATUS" && exit 1)

  # ── Notify on failure ────────────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: failure()
    steps:
      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.NOTIFY_EMAIL }}
          password: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          to: darshinilatha2000@gmail.com
          subject: "DockWise Deploy FAILED — ${{ github.run_id }}"
          body: |
            A deployment failed on branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            View logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

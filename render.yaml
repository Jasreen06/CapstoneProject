services:
  - type: web
    name: dockwise-backend
    runtime: python
    rootDir: venv2/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: WEATHER_API_KEY
        sync: false
      - key: AISSTREAM_API_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  - type: web
    name: dockwise-frontend
    runtime: static
    rootDir: venv2/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        sync: false
      - key: REACT_APP_AIS_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# render.yaml — DockWise AI deployment on Render
# Note: Frontend static site must be created manually in Render dashboard.
# This file handles: backend, AIS service, and cron jobs.

services:

  # ── 1. Backend API ────────────────────────────────────────────────────────
  - type: web
    name: dockwise-backend
    runtime: python
    rootDir: venv2/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: WEATHER_API_KEY
        sync: false
      - key: AISSTREAM_API_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://dockwise-frontend.onrender.com,http://localhost:3000

  # ── 2. AIS Vessel Tracking Service ────────────────────────────────────────
  - type: web
    name: dockwise-ais
    runtime: python
    rootDir: venv2/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn AIS.ais_api:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: AISSTREAM_API_KEY
        sync: false

  # ── 3. Cron: Daily data pull (06:00 UTC) ──────────────────────────────────
  - type: cron
    name: dockwise-daily-pull
    runtime: python
    rootDir: venv2/backend
    schedule: "0 6 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "from dotenv import load_dotenv; load_dotenv(); from db import init_tables; init_tables(); from data_pull import run_ports, run_chokepoints; run_ports(); run_chokepoints()"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: WEATHER_API_KEY
        sync: false

  # ── 4. Cron: Validate forecasts (07:00 UTC) ───────────────────────────────
  - type: cron
    name: dockwise-validate-forecasts
    runtime: python
    rootDir: venv2/backend
    schedule: "0 7 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "from dotenv import load_dotenv; load_dotenv(); from forecast_tracker import validate; import json; print(json.dumps(validate(), indent=2))"
    envVars:
      - key: DATABASE_URL
        sync: false

  # ── 5. Cron: Weekly model comparison (Monday 08:00 UTC) ───────────────────
  - type: cron
    name: dockwise-model-comparison
    runtime: python
    rootDir: venv2/backend
    schedule: "0 8 * * 1"
    buildCommand: pip install -r requirements.txt
    startCommand: python model_comparison.py --top-n 5
    envVars:
      - key: DATABASE_URL
        sync: false
